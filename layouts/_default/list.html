{{ define "main" }}
<main class="article-list">
    <header>
        {{ .Title }}
    </header>
    <section id="list" class="grid">
        {{ $posts := .Pages }}
        {{ $paginator := .Paginate $posts }}
        {{ range $paginator.Pages }} {{ partial "article-list/default" . }} {{ end }}
    </section>
    {{ if gt $paginator.TotalPages 1}} {{ partial "pagination" . }} {{ end }}
</main>
{{ end }}
